<!DOCTYPE html>

  <link rel="stylesheet" href="assets/css/main.css" />

  <style>
    .ii-clients-intro {
      font-size: var(--text-base);
      line-height: var(--lh);
      color: var(--text-soft);
      margin-bottom: 28px;
    }

    .ii-logo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .ii-logo-cell {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      transition: border-color .15s, box-shadow .15s;
      min-height: 90px;
    }

    .ii-logo-cell:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 10px rgba(229, 0, 95, .10);
    }

    .ii-logo-cell img {
      max-width: 130px;
      max-height: 56px;
      object-fit: contain;
      filter: grayscale(40%);
      transition: filter .2s;
    }

    .ii-logo-cell:hover img {
      filter: grayscale(0%);
    }

    @media (max-width: 768px) {
      .ii-logo-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 420px) {
      .ii-logo-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
